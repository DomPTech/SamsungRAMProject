<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Denture Progress | RAM</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --primary: #2f5d8a;
            --primary-dark: #1f3c88;
            --secondary: #248E9C;
            --accent: #6ea235;
            --danger: #c62828;
            --light-bg: #f4f7f9;
            --white: #ffffff;
            --text-dark: #333333;
            --shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
        }

        body {
            margin: 0;
            font-family: 'Inter', sans-serif;
            background: var(--light-bg);
            color: var(--text-dark);
        }

        .hidden {
            display: none !important;
        }

        /* Buttons */
        .btn {
            border: none;
            border-radius: 8px;
            padding: 12px 24px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s;
        }

        .btn:hover {
            filter: brightness(1.1);
            transform: translateY(-1px);
        }

        #startScreen {
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
        }

        .start-card {
            background: white;
            padding: 60px;
            border-radius: 24px;
            text-align: center;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.3);
        }

        #authScreen {
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: var(--light-bg);
        }

        .auth-card {
            background: white;
            width: 100%;
            max-width: 400px;
            padding: 40px;
            border-radius: 16px;
            box-shadow: var(--shadow);
        }

        .input-group {
            margin-bottom: 20px;
        }

        .input-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: var(--primary);
        }

        input {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 8px;
            box-sizing: border-box;
        }

        /* --- SCREEN 3: DASHBOARD --- */
        .topbar {
            background: var(--primary-dark);
            color: white;
            padding: 8px 30px;
            font-size: 13px;
            display: flex;
            gap: 20px;
        }

        .navbar {
            background: white;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 30px;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.05);
        }

        .nav-links a {
            margin-right: 20px;
            text-decoration: none;
            color: #666;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
        }

        .nav-links a:hover {
            color: var(--primary);
        }

        .container {
            max-width: 1100px;
            margin: 0 auto;
            padding: 40px 20px;
        }

        .dashboard-grid {
            display: grid;
            grid-template-columns: 1fr 350px;
            gap: 30px;
        }

        .card {
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: var(--shadow);
            margin-bottom: 20px;
        }

        .step-item {
            padding: 15px;
            background: #f0f7ff;
            border-left: 5px solid var(--secondary);
            border-radius: 4px;
            margin-top: 15px;
        }

        .fade-in {
            animation: fadeIn 0.4s ease-in;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
            }

            to {
                opacity: 1;
            }
        }
    </style>
</head>

<body>
    <div id="settingsScreen" class="hidden fade-in"
        style="height: 100vh; display: flex; justify-content: center; align-items: center; background: var(--light-bg);">
        <div class="auth-card">
            <h2 style="margin-top:0; color: var(--primary);">Server Configuration</h2>
            <p style="color: #666; font-size: 0.9rem; margin-bottom: 20px;">Enter the local IP address or hostname of
                your Raspberry Pi.</p>

            <div class="input-group">
                <label>Server IP / Hostname</label>
                <input type="text" id="serverIpInput" placeholder="e.g. 192.168.86.32 or raspberrypi.local">
            </div>

            <button class="btn" style="background: var(--primary); color: white; width: 100%; margin-bottom: 10px;"
                onclick="saveSettings()">Save & Connect</button>
            <button class="btn" style="background: transparent; color: #666; width: 100%; border: 1px solid #ddd;"
                onclick="closeSettings()">Cancel</button>
        </div>
    </div>

    <div id="dashboard" class="fade-in">
        <div class="topbar">
            <span id="liveTime"></span>
            <span>📞 (865) 579-1530</span>
            <span>✉️ info@ramusa.org</span>
        </div>

        <nav class="navbar">
            <div class="nav-links">
                <a onclick="renderPage('home')">Home</a>
                <a onclick="renderPage('about')">About</a>
                <a onclick="renderPage('schedule')">Schedule</a>
                <a onclick="renderPage('faq')">FAQ</a>
            </div>
            <div class="nav-actions">
                <button class="btn" style="background: #e0e0e0; color: #333; padding: 8px 15px; margin-right: 10px;"
                    onclick="showSettings()">Settings</button>
                <button class="btn" style="background: #fff; color: var(--primary); border: 1px solid #ddd; padding: 8px 15px; margin-right: 10px;" onclick="openAdmin()">Admin</button>
                <a href="scanner.html" class="btn" style="background: var(--accent); color: white; padding: 8px 15px; text-decoration: none;">Open Scanner</a>
            </div>
        </nav>

        <div class="container" id="mainContent">
        </div>
    </div>

    <div id="adminModal" class="hidden" style="position:fixed; inset:0; display:flex; align-items:center; justify-content:center; background: rgba(0,0,0,0.4); z-index:50;">
        <div class="auth-card" style="width:720px; max-width:95%;">
            <div style="display:flex; justify-content:space-between; align-items:center;">
                <h2 style="margin:0; color:var(--primary);">Admin Console</h2>
                <div>
                    <button class="btn" style="background:#e0e0e0; color:#333; margin-right:8px;" onclick="closeAdmin()">Close</button>
                    <button id="adminLogoutBtn" class="btn hidden" style="background:#f44336; color:white;" onclick="adminLogout()">Logout</button>
                </div>
            </div>

            <div id="adminLoginForm" style="margin-top:18px;">
                <p style="color:#666;">Sign in to manage stages and queue.</p>
                <div class="input-group">
                    <label>Username</label>
                    <input id="adminUser" type="text" />
                </div>
                <div class="input-group">
                    <label>Password</label>
                    <input id="adminPass" type="password" />
                </div>
                <div style="display:flex; gap:10px;">
                    <button class="btn" style="background:var(--primary); color:white;" onclick="adminLogin()">Sign In</button>
                    <button class="btn" style="background:transparent; border:1px solid #ddd;" onclick="closeAdmin()">Cancel</button>
                </div>
            </div>

            <div id="adminPanel" class="hidden" style="margin-top:16px;">
                <h3 style="margin-top:0;">Stages</h3>
                <div id="adminStagesList" style="max-height:260px; overflow:auto; margin-bottom:12px;"></div>

                <div style="display:flex; gap:8px; align-items:center;">
                    <input id="newStageName" placeholder="New stage name" style="flex:1;padding:10px;border:1px solid #ddd;border-radius:8px;" />
                    <button class="btn" style="background:var(--accent); color:white;" onclick="createStageAdmin()">Add</button>
                </div>
                <p style="color:#777; font-size:0.9rem; margin-top:12px;">Stage order determines progress flow. Use edit/delete to manage.</p>
            </div>
        </div>
    </div>

    <script>
        window.onload = function() {
             renderPage('home');
             startTime();
        };

        function showSettings() {
            document.getElementById("dashboard").classList.add("hidden");
            document.getElementById("settingsScreen").classList.remove("hidden");
            document.getElementById("serverIpInput").value = localStorage.getItem('pi-server-ip') || '';
        }

        function saveSettings() {
            const ip = document.getElementById("serverIpInput").value.trim();
            if (ip) {
                localStorage.setItem('pi-server-ip', ip);
                closeSettings();
                fetchDentures();
            } else {
                alert("Please enter a valid IP address.");
            }
        }

        function closeSettings() {
            document.getElementById("settingsScreen").classList.add("hidden");
            document.getElementById("dashboard").classList.remove("hidden");
        }

        async function renderPage(page, name = "Staff") {
            const content = document.getElementById("mainContent");

            if (page === 'home') {
                content.innerHTML = `
                <div class="dashboard-grid">
                    <div>
                        <h1 style="color: var(--primary); margin: 0;">Tray Tracking Dashboard</h1>
                        <p style="color: #666; font-size: 1.1rem; margin-top: 5px;">Real-time progress of all denture trays.</p>
                        <div id="denture-list" style="margin-top: 30px;">
                            <p>Loading trays...</p>
                        </div>
                    </div>
                    <div class="card" style="height: fit-content;">
                        <h3>Clinic Status</h3>
                        <div style="background: #eee; height: 180px; border-radius: 8px; display: flex; align-items: center; justify-content: center; color: #999;">Active Station: Lab</div>
                    </div>
                </div>`;

                await fetchDentures();
                // Auto-refresh every 5 seconds
                if (window.refreshInterval) clearInterval(window.refreshInterval);
                window.refreshInterval = setInterval(fetchDentures, 5000);

            } else if (page === 'about') {
            }
        }

        async function fetchDentures() {
            const hostname = localStorage.getItem('pi-server-ip') || 'raspberrypi.local';
            const SERVER_URL = `https://${hostname}:5001`;
            try {
                const response = await fetch(`${SERVER_URL}/api/dentures`);
                const data = await response.json();
                const dentures = data.dentures;
                const steps = data.steps;
                const totalSteps = steps.length;

                const list = document.getElementById('denture-list');
                if (!list) return;

                if (dentures.length === 0) {
                    list.innerHTML = '<div class="card">No trays currently being tracked. Scan a tray to start.</div>';
                    return;
                }

                list.innerHTML = dentures.map(d => {
                    const progressPercent = Math.min(((d.step_index + 1) / totalSteps) * 100, 100);
                    return `
                    <div class="card" style="margin-bottom: 15px; border-left: 8px solid ${d.step_index >= totalSteps - 1 ? 'var(--accent)' : 'var(--secondary)'}">
                        <div style="display: flex; justify-content: space-between; align-items: center;">
                            <div>
                                <h3 style="margin: 0;">${d.patient} (ID: ${d.serial.slice(-4)})</h3>
                                <p style="margin: 5px 0; color: var(--primary); font-weight: 600;">Status: ${d.step_name}</p>
                            </div>
                            <div style="text-align: right;">
                                <span style="font-size: 0.8rem; color: #888;">Step ${d.step_index + 1} of ${totalSteps}</span><br>
                                <span style="font-size: 0.7rem; color: #aaa;">Updated: ${new Date(d.updated).toLocaleTimeString()}</span>
                            </div>
                        </div>
                        <div style="background: #eee; height: 8px; border-radius: 4px; margin-top: 15px; overflow: hidden;">
                            <div style="background: var(--accent); width: ${progressPercent}%; height: 100%; transition: width 0.5s;"></div>
                        </div>
                    </div>
                `}).join('');
            } catch (err) {
                console.error("Failed to fetch dentures:", err);
            }
        }

        function startTime() {
            setInterval(() => {
                const now = new Date();
                document.getElementById('liveTime').innerText = now.toLocaleString();
            }, 1000);
        }

        function getServerUrl() {
            const hostname = localStorage.getItem('pi-server-ip') || 'raspberrypi.local';
            return `https://${hostname}:5001`;
        }

        function openAdmin() {
            document.getElementById('adminModal').classList.remove('hidden');
            const token = localStorage.getItem('adminToken');
            if (token) {
                document.getElementById('adminLoginForm').classList.add('hidden');
                document.getElementById('adminPanel').classList.remove('hidden');
                document.getElementById('adminLogoutBtn').classList.remove('hidden');
                loadAdminStages();
            } else {
                document.getElementById('adminLoginForm').classList.remove('hidden');
                document.getElementById('adminPanel').classList.add('hidden');
                document.getElementById('adminLogoutBtn').classList.add('hidden');
            }
        }

        function closeAdmin() {
            document.getElementById('adminModal').classList.add('hidden');
        }

        async function adminLogin() {
            const user = document.getElementById('adminUser').value.trim();
            const pass = document.getElementById('adminPass').value;
            if (!user || !pass) { alert('Enter username and password'); return; }
            const SERVER_URL = getServerUrl();
            try {
                const res = await fetch(`${SERVER_URL}/api/auth/login`, {
                    method: 'POST', headers: {'Content-Type':'application/json'},
                    body: JSON.stringify({username: user, password: pass})
                });
                const data = await res.json();
                if (res.ok && data.token) {
                    localStorage.setItem('adminToken', data.token);
                    document.getElementById('adminLoginForm').classList.add('hidden');
                    document.getElementById('adminPanel').classList.remove('hidden');
                    document.getElementById('adminLogoutBtn').classList.remove('hidden');
                    loadAdminStages();
                } else {
                    alert(data.error || 'Login failed');
                }
            } catch (err) {
                console.error('Admin login failed', err);
                alert('Unable to contact server');
            }
        }

        function adminLogout() {
            localStorage.removeItem('adminToken');
            document.getElementById('adminPanel').classList.add('hidden');
            document.getElementById('adminLoginForm').classList.remove('hidden');
            document.getElementById('adminLogoutBtn').classList.add('hidden');
        }

        async function loadAdminStages() {
            const SERVER_URL = getServerUrl();
            try {
                const res = await fetch(`${SERVER_URL}/api/stages`);
                const data = await res.json();
                const list = document.getElementById('adminStagesList');
                list.innerHTML = '';
                data.stages.forEach(s => {
                    const el = document.createElement('div');
                    el.style.display = 'flex';
                    el.style.justifyContent = 'space-between';
                    el.style.alignItems = 'center';
                    el.style.padding = '8px 6px';
                    el.style.borderBottom = '1px solid #f0f0f0';
                    el.innerHTML = `<div style="flex:1">${s.ordering+1}. ${s.name}</div>`;
                    const actions = document.createElement('div');
                    actions.style.display = 'flex';
                    actions.style.gap = '6px';
                    const editBtn = document.createElement('button');
                    editBtn.className = 'btn'; editBtn.style.background = '#e0e0e0'; editBtn.innerText = 'Edit';
                    editBtn.onclick = () => editStageAdmin(s.id, s.name);
                    const delBtn = document.createElement('button');
                    delBtn.className = 'btn'; delBtn.style.background = '#f44336'; delBtn.style.color = 'white'; delBtn.innerText = 'Delete';
                    delBtn.onclick = () => deleteStageAdmin(s.id);
                    actions.appendChild(editBtn); actions.appendChild(delBtn);
                    el.appendChild(actions);
                    list.appendChild(el);
                });
            } catch (err) {
                console.error('Failed to load stages', err);
            }
        }

        async function createStageAdmin() {
            const name = document.getElementById('newStageName').value.trim();
            if (!name) { alert('Enter a stage name'); return; }
            const SERVER_URL = getServerUrl();
            const token = localStorage.getItem('adminToken');
            try {
                const res = await fetch(`${SERVER_URL}/api/stages`, {
                    method: 'POST', headers: {'Content-Type':'application/json', 'Authorization': `Bearer ${token}`},
                    body: JSON.stringify({name})
                });
                const data = await res.json();
                if (res.ok) {
                    document.getElementById('newStageName').value = '';
                    loadAdminStages();
                } else {
                    alert(data.error || 'Failed to create stage');
                }
            } catch (err) {
                console.error('Create stage failed', err);
                alert('Unable to contact server');
            }
        }

        async function deleteStageAdmin(id) {
            if (!confirm('Delete this stage?')) return;
            const SERVER_URL = getServerUrl();
            const token = localStorage.getItem('adminToken');
            try {
                const res = await fetch(`${SERVER_URL}/api/stages/${id}`, {
                    method: 'DELETE', headers: {'Authorization': `Bearer ${token}`}
                });
                if (res.ok) loadAdminStages();
                else {
                    const data = await res.json(); alert(data.error || 'Failed to delete');
                }
            } catch (err) { console.error(err); alert('Unable to contact server'); }
        }

        async function editStageAdmin(id, currentName) {
            const name = prompt('New stage name', currentName);
            if (name === null) return;
            const ordering = parseInt(prompt('New ordering (0-based index)', '0')); // optional
            const payload = {};
            if (name) payload.name = name;
            if (!isNaN(ordering)) payload.ordering = ordering;
            const SERVER_URL = getServerUrl();
            const token = localStorage.getItem('adminToken');
            try {
                const res = await fetch(`${SERVER_URL}/api/stages/${id}`, {
                    method: 'PUT', headers: {'Content-Type':'application/json', 'Authorization': `Bearer ${token}`},
                    body: JSON.stringify(payload)
                });
                if (res.ok) loadAdminStages();
                else { const data = await res.json(); alert(data.error || 'Update failed'); }
            } catch (err) { console.error(err); alert('Unable to contact server'); }
        }
    </script>

</body>

</html>
