<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Denture Progress | RAM</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <script src="dashboard.js"></script>

    <style>
        :root {
            --primary: #2f5d8a;
            --primary-dark: #1f3c88;
            --secondary: #248E9C;
            --accent: #6ea235;
            --danger: #c62828;
            --light-bg: #f4f7f9;
            --white: #ffffff;
            --text-dark: #333333;
            --shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
        }

        body {
            margin: 0;
            font-family: 'Inter', sans-serif;
            background: var(--light-bg);
            color: var(--text-dark);
        }

        .hidden {
            display: none !important;
        }

        /* Buttons */
        .btn {
            border: none;
            border-radius: 8px;
            padding: 12px 24px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s;
        }

        .btn:hover {
            filter: brightness(1.1);
            transform: translateY(-1px);
        }

        #startScreen {
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
        }

        .start-card {
            background: white;
            padding: 60px;
            border-radius: 24px;
            text-align: center;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.3);
        }

        #authScreen {
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: var(--light-bg);
        }

        .auth-card {
            background: white;
            width: 100%;
            max-width: 400px;
            padding: 40px;
            border-radius: 16px;
            box-shadow: var(--shadow);
        }

        .input-group {
            margin-bottom: 20px;
        }

        .input-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: var(--primary);
        }

        input {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 8px;
            box-sizing: border-box;
        }

        /* --- SCREEN 3: DASHBOARD --- */
        .topbar {
            background: var(--primary-dark);
            color: white;
            padding: 8px 30px;
            font-size: 13px;
            display: flex;
            gap: 20px;
        }

        .navbar {
            background: white;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 30px;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.05);
        }

        .nav-links a {
            margin-right: 20px;
            text-decoration: none;
            color: #666;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
        }

        .nav-links a:hover {
            color: var(--primary);
        }

        .container {
            max-width: 1100px;
            margin: 0 auto;
            padding: 40px 20px;
        }

        .dashboard-grid {
            display: grid;
            grid-template-columns: 1fr 350px;
            gap: 30px;
        }

        .card {
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: var(--shadow);
            margin-bottom: 20px;
        }

        .step-item {
            padding: 15px;
            background: #f0f7ff;
            border-left: 5px solid var(--secondary);
            border-radius: 4px;
            margin-top: 15px;
        }

        .fade-in {
            animation: fadeIn 0.4s ease-in;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
            }

            to {
                opacity: 1;
            }
        }
    </style>
</head>

<body>
    

    <div id="dashboard" class="fade-in">
        <div class="topbar">
            <span id="liveTime"></span>
            <span>📞 (865) 579-1530</span>
            <span>✉️ info@ramusa.org</span>
        </div>

        <nav class="navbar">
            <div class="nav-links">
                <a onclick="renderPage('home')">Home</a>
                <a onclick="renderPage('about')">About</a>
                <a onclick="renderPage('schedule')">Schedule</a>
                <a onclick="renderPage('faq')">FAQ</a>
            </div>
            <div class="nav-actions">
                
                <button class="btn" style="background: #fff; color: var(--primary); border: 1px solid #ddd; padding: 8px 15px; margin-right: 10px;" onclick="openAdmin()">Admin</button>
                <a href="scanner.html" class="btn" style="background: var(--accent); color: white; padding: 8px 15px; text-decoration: none;">Open Scanner</a>
            </div>
        </nav>

        <div class="container" id="mainContent">
        </div>
    </div>

    <div id="adminModal" class="hidden" style="position:fixed; inset:0; display:flex; align-items:center; justify-content:center; background: rgba(0,0,0,0.4); z-index:50;">
        <div class="auth-card" style="width:720px; max-width:95%;">
            <div style="display:flex; justify-content:space-between; align-items:center;">
                <h2 style="margin:0; color:var(--primary);">Admin Console</h2>
                <div>
                    <button class="btn" style="background:#e0e0e0; color:#333; margin-right:8px;" onclick="closeAdmin()">Close</button>
                    <button id="adminLogoutBtn" class="btn hidden" style="background:#f44336; color:white;" onclick="adminLogout()">Logout</button>
                </div>
            </div>

            <div id="adminLoginForm" style="margin-top:18px;">
                <p style="color:#666;">Sign in to manage stages and queue.</p>
                <div class="input-group">
                    <label>Username</label>
                    <input id="adminUser" type="text" />
                </div>
                <div class="input-group">
                    <label>Password</label>
                    <input id="adminPass" type="password" />
                </div>
                <div style="display:flex; gap:10px;">
                    <button class="btn" style="background:var(--primary); color:white;" onclick="adminLogin()">Sign In</button>
                    <button class="btn" style="background:transparent; border:1px solid #ddd;" onclick="closeAdmin()">Cancel</button>
                </div>
            </div>

            <div id="adminPanel" class="hidden" style="margin-top:16px;">
                <h3 style="margin-top:0;">Stages</h3>
                <div id="adminStagesList" style="max-height:260px; overflow:auto; margin-bottom:12px;"></div>

                <div style="display:flex; gap:8px; align-items:center;">
                    <input id="newStageName" placeholder="New stage name" style="flex:1;padding:10px;border:1px solid #ddd;border-radius:8px;" />
                    <button class="btn" style="background:var(--accent); color:white;" onclick="createStageAdmin()">Add</button>
                </div>
                <p style="color:#777; font-size:0.9rem; margin-top:12px;">Stage order determines progress flow. Use edit/delete to manage.</p>
            </div>
        </div>
    </div>
</body>

</html>
